version: "3.9"  

services:  
  admin-dashboard:  
    build:  
      context: .  
      dockerfile: Dockerfile  
    ports:  
      - "80:3000" # Map cổng 3000 trên host -> cổng 3000 trong container  
    volumes:  
      - .:/app       # Đồng bộ mã nguồn dự án bên ngoài vào container  
      - /app/node_modules # Để tránh ghi đè thư mục node_modules  
    stdin_open: true   # Giữ terminal open để phát triển linh hoạt  
    tty: true          # Để React server không ngắt
    restart: always
